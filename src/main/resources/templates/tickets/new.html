<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создать заявку - ServiceDesk</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <div th:replace="~{fragments/nav :: topbar('new')}"></div>

    <section class="panel">
        <form method="post" action="/tickets" enctype="multipart/form-data" class="grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <div class="field">
                    <label for="title">Тема</label>
                    <input id="title" name="title" required>
                </div>
                <div class="field">
                    <label for="category">Категория</label>
                    <select id="category" name="category" required>
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                    </select>
                </div>
                <div class="field">
                    <label for="priority">Приоритет</label>
                    <select id="priority" name="priority">
                        <option th:each="priority : ${priorities}" th:value="${priority.name()}" th:text="${priority.title}"></option>
                    </select>
                </div>
                <div class="field">
                    <label for="file">Вложение</label>
                    <input id="file" type="file" name="file">
                </div>
            </div>
            <div class="field">
                <label for="description">Описание</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div>
                <button type="submit">Создать заявку</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
