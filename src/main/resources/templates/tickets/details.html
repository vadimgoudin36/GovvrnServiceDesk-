<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${'Заявка #' + ticket.id + ' - ServiceDesk'}"></title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <div th:replace="~{fragments/nav :: topbar('tickets')}"></div>
    <div th:if="${message}" class="message" th:text="${message}"></div>

    <div class="grid two">
        <section class="panel">
            <h2 class="ticket-title" th:text="${ticket.title}"></h2>
            <div class="meta">
                <span class="badge" th:classappend="' status-' + ${ticket.status.name()}" th:text="${ticket.status.title}"></span>
                <span class="badge" th:classappend="' priority-' + ${ticket.priority.name()}" th:text="${ticket.priority.title}"></span>
                <span class="badge" th:text="${ticket.category}"></span>
            </div>
            <p class="muted">
                Автор: <span th:text="${ticket.authorName}"></span> |
                Исполнитель: <span th:text="${ticket.executorName ?: '-'}"></span> |
                Срок: <span th:text="${ticket.dueAt ?: '-'}"></span>
            </p>
            <h3>Описание</h3>
            <p style="white-space: pre-wrap" th:text="${ticket.description}"></p>

            <div th:if="${ticket.resolutionReport != null and !ticket.resolutionReport.isBlank()}">
                <h3>Отчет о выполнении</h3>
                <p style="white-space: pre-wrap" th:text="${ticket.resolutionReport}"></p>
            </div>
        </section>

        <aside class="grid">
            <section class="panel" th:if="${currentUser.role.name() == 'ADMIN'}">
                <h3>Назначение</h3>
                <form method="post" th:action="@{/tickets/{id}/assign(id=${ticket.id})}" class="grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field">
                        <label for="executorId">IT-специалист</label>
                        <select id="executorId" name="executorId" required>
                            <option th:each="specialist : ${specialists}" th:value="${specialist.id}" th:text="${specialist.fullName}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="dueAt">Срок исполнения</label>
                        <input id="dueAt" type="date" name="dueAt" th:value="${ticket.dueAt}">
                    </div>
                    <div class="field">
                        <label for="priority">Приоритет</label>
                        <select id="priority" name="priority">
                            <option th:each="priority : ${priorities}" th:value="${priority.name()}" th:text="${priority.title}" th:selected="${priority == ticket.priority}"></option>
                        </select>
                    </div>
                    <button type="submit">Назначить</button>
                </form>
            </section>

            <section class="panel" th:if="${currentUser.role.name() == 'SPECIALIST'}">
                <h3>Работа специалиста</h3>
                <form method="post" th:action="@{/tickets/{id}/take(id=${ticket.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Взять в работу</button>
                </form>
                <form method="post" th:action="@{/tickets/{id}/status(id=${ticket.id})}" class="grid" style="margin-top: 12px">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field">
                        <label for="status">Статус</label>
                        <select id="status" name="status">
                            <option th:each="status : ${statuses}" th:value="${status.name()}" th:text="${status.title}" th:selected="${status == ticket.status}"></option>
                        </select>
                    </div>
                    <button class="secondary" type="submit">Сменить статус</button>
                </form>
                <form method="post" th:action="@{/tickets/{id}/complete(id=${ticket.id})}" class="grid" style="margin-top: 12px">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="field">
                        <label for="report">Отчет о выполнении</label>
                        <textarea id="report" name="report" required></textarea>
                    </div>
                    <button type="submit">Отметить выполненной</button>
                </form>
            </section>
        </aside>
    </div>

    <section class="panel">
        <h3>Вложения</h3>
        <p th:if="${attachments.isEmpty()}" class="muted">Файлов пока нет</p>
        <ul th:if="${!attachments.isEmpty()}">
            <li th:each="attachment : ${attachments}">
                <a th:href="@{/attachments/{id}(id=${attachment.id})}" th:text="${attachment.fileName}"></a>
                <span class="muted" th:text="${' | ' + attachment.authorName + ' | ' + attachment.createdAt}"></span>
            </li>
        </ul>
    </section>

    <section class="panel">
        <h3>Комментарии</h3>
        <div th:each="comment : ${comments}" class="comment">
            <strong th:text="${comment.authorName}"></strong>
            <span class="muted" th:text="${comment.createdAt}"></span>
            <p style="white-space: pre-wrap" th:text="${comment.text}"></p>
        </div>
        <p th:if="${comments.isEmpty()}" class="muted">Комментариев пока нет</p>

        <form method="post" th:action="@{/tickets/{id}/comments(id=${ticket.id})}" enctype="multipart/form-data" class="grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label for="commentText">Новый комментарий</label>
                <textarea id="commentText" name="text"></textarea>
            </div>
            <div class="actions">
                <div class="field">
                    <label for="commentFile">Файл</label>
                    <input id="commentFile" type="file" name="file">
                </div>
                <button type="submit">Добавить</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
