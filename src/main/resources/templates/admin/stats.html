<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Статистика - ServiceDesk</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <div th:replace="~{fragments/nav :: topbar('stats')}"></div>

    <div class="grid two">
        <section class="panel">
            <h3>По статусам</h3>
            <table>
                <tr th:each="entry : ${statusStats}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
                <tr th:if="${statusStats.isEmpty()}"><td colspan="2" class="muted">Нет данных</td></tr>
            </table>
        </section>
        <section class="panel">
            <h3>По приоритетам</h3>
            <table>
                <tr th:each="entry : ${priorityStats}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
                <tr th:if="${priorityStats.isEmpty()}"><td colspan="2" class="muted">Нет данных</td></tr>
            </table>
        </section>
    </div>
</main>
</body>
</html>
