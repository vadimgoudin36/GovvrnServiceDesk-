<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Пользователи - ServiceDesk</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <div th:replace="~{fragments/nav :: topbar('users')}"></div>
    <div th:if="${message}" class="message" th:text="${message}"></div>

    <section class="panel">
        <h3>Добавить пользователя</h3>
        <form method="post" action="/admin/users" class="form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field"><label>Логин</label><input name="login" required></div>
            <div class="field"><label>Пароль</label><input name="password" required></div>
            <div class="field"><label>ФИО</label><input name="fullName" required></div>
            <div class="field">
                <label>Роль</label>
                <select name="role">
                    <option th:each="role : ${roles}" th:value="${role.name()}" th:text="${role.title}"></option>
                </select>
            </div>
            <button type="submit">Добавить</button>
        </form>
    </section>

    <section class="panel">
        <h3>Список пользователей</h3>
        <table>
            <thead>
            <tr><th>ID</th><th>Логин</th><th>ФИО</th><th>Роль</th><th>Редактирование</th></tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.login}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.role.title}"></td>
                <td>
                    <form method="post" action="/admin/users/update" class="actions">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="id" th:value="${user.id}">
                        <input name="login" th:value="${user.login}" required style="width: 130px">
                        <input name="password" placeholder="Новый пароль" style="width: 150px">
                        <input name="fullName" th:value="${user.fullName}" required style="width: 260px">
                        <select name="role" style="width: 180px">
                            <option th:each="role : ${roles}" th:value="${role.name()}" th:text="${role.title}" th:selected="${role == user.role}"></option>
                        </select>
                        <button class="secondary" type="submit">Сохранить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
