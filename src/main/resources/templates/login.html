<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - ServiceDesk</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="login-page">
    <section class="login-card">
        <div class="brand">
            <img src="/img/coat_of_arms.png" alt="Герб Воронежской области">
            <div>
                <h1 class="brand-title">ServiceDesk</h1>
                <p class="brand-subtitle">Министерство региональной безопасности Воронежской области</p>
            </div>
        </div>

        <form class="login-form" method="post" action="/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div th:if="${param.error}" class="error">Неверный логин или пароль</div>
            <div th:if="${param.logout}" class="message">Вы вышли из системы</div>

            <div class="field">
                <label for="username">Логин</label>
                <input id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Войти</button>
            <p class="muted">Тестовые пользователи: user / it / admin, пароль 1234</p>
        </form>
    </section>
</main>
</body>
</html>
