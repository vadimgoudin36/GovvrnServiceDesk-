<div th:fragment="topbar(active)">
    <header class="topbar">
        <div class="brand compact">
            <img src="/img/coat_of_arms.png" alt="Герб Воронежской области">
            <div>
                <h1 class="brand-title">ServiceDesk Министерства региональной безопасности Воронежской области</h1>
                <p class="brand-subtitle" th:text="${currentUser.fullName + ' | ' + currentUser.role.title}"></p>
            </div>
        </div>
        <form method="post" action="/logout">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="secondary" type="submit">Выйти</button>
        </form>
    </header>

    <nav class="nav">
        <a th:classappend="${active == 'tickets'} ? ' active'" href="/tickets">Заявки</a>
        <a th:if="${currentUser.role.name() == 'EMPLOYEE'}" th:classappend="${active == 'new'} ? ' active'" href="/tickets/new">Создать заявку</a>
        <a th:if="${currentUser.role.name() == 'ADMIN'}" th:classappend="${active == 'assignments'} ? ' active'" href="/admin/assignments">Назначение</a>
        <a th:if="${currentUser.role.name() == 'ADMIN'}" th:classappend="${active == 'users'} ? ' active'" href="/admin/users">Пользователи</a>
        <a th:if="${currentUser.role.name() == 'ADMIN'}" th:classappend="${active == 'stats'} ? ' active'" href="/admin/stats">Статистика</a>
    </nav>
</div>
